# Gitleaks configuration for iPop360
# Allows documented placeholder keys in .env.example while detecting real secrets

title = "iPop360 Secret Scanning"

# Extend the default gitleaks config
[extend]
useDefault = true

# Allow the placeholder keys in .env.example (these are documentation, not secrets)
[allowlist]
description = "Allow documented placeholder keys in .env.example"
paths = [
  '''\.env\.example$'''
]
regexes = [
  '''^[\w_]+=$''',                           # Empty values like "API_KEY="
  '''^[\w_]+=["']?localhost["']?$''',        # Localhost placeholders
  '''^[\w_]+=["']?hello@example\.com["']?$''', # Example email
  '''^[\w_]+=["']?\$\{[\w_]+\}["']?$''',   # Variable references like "${APP_NAME}"
  '''^[\w_]+=["']?127\.0\.0\.1["']?$''',    # Localhost IPs
  '''^[\w_]+=["']?0\.0["']?$''',            # Zero values
  '''^#''',                                 # Comment lines
  '''const \w+_KEY\s*=\s*['"][\w_]+['"]''', # localStorage/sessionStorage key constants
]
