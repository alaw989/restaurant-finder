# Gitleaks configuration for iPop360
# Allows documented placeholder keys in .env.example while detecting real secrets

title = "iPop360 Secret Scanning"

# Extend the default gitleaks config
[extend]
useDefault = true

# Allow the placeholder keys in .env.example (these are documentation, not secrets)
[[allowlist]]
description = "Allow documented placeholder keys in .env.example"
paths = [
  '''\.env\.example$'''
]

# Allow specific patterns that are placeholders (empty values or documented examples)
[[allowlist.regexes]]
description = "Allow empty placeholder values and documented examples"
regex = '''^[\w_]+=$'''

[[allowlist.regexes]]
description = "Allow localhost placeholders"
regex = '''^[\w_]+=["']?localhost["']?$'''

[[allowlist.regexes]]
description = "Allow example email placeholder"
regex = '''^[\w_]+=["']?hello@example\.com["']?$'''

[[allowlist.regexes]]
description = "Allow variable references"
regex = '''^[\w_]+=["']?\$\{[\w_]+\}["']?$'''

[[allowlist.regexes]]
description = "Allow localhost IPs"
regex = '''^[\w_]+=["']?127\.0\.0\.1["']?$'''

[[allowlist.regexes]]
description = "Allow zero values"
regex = '''^[\w_]+=["']?0\.0["']?$'''

[[allowlist.regexes]]
description = "Allow comment lines"
regex = '''^#'''
