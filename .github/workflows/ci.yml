name: CI Quality Gate

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-quality
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies (with dev)
        run: composer install

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: php artisan test

      - name: Diagnostic - capture full test-warning details (TEMPORARY, non-gating)
        # artisan test records the warnings internally; JUnit XML (enabled in
        # phpunit.xml) should carry the full untruncated message. Run via
        # artisan test, then dump the junit warning details. Non-gating.
        if: always()
        continue-on-error: true
        run: |
          php artisan test >/dev/null 2>&1 || true
          echo '=== junit: file_get_contents warning details ==='
          grep -i 'file_get_contents' /tmp/junit.xml | head -20 || echo '(no junit / no match)'

      - name: Run Pint (lint check)
        run: vendor/bin/pint --test
