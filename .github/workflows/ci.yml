name: CI Quality Gate

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-quality
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies (with dev)
        run: composer install

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: php artisan test

      - name: Diagnostic - capture full test-warning details (TEMPORARY, non-gating)
        # Raw phpunit suppresses the warnings (Laravel's artisan test runner is
        # what surfaces them). So run via artisan test with phpunit.xml's
        # displayDetailsOnTestsThatTriggeredWarnings=true to print the FULL
        # untruncated message + location of every warning. Non-gating. REMOVE
        # once the file_get_contents warning source is identified and fixed.
        if: always()
        continue-on-error: true
        run: php artisan test 2>&1 | grep -iE 'triggered|file_get_contents|warning|deprecat|\.php' | head -40

      - name: Run Pint (lint check)
        run: vendor/bin/pint --test
