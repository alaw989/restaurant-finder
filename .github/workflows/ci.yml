name: CI Quality Gate

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-quality
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies (with dev)
        run: composer install

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: php artisan test

      - name: Diagnostic - capture full test-warning details (TEMPORARY, non-gating)
        # Laravel's artisan test surfaces ~263 file_get_contents warnings that
        # raw phpunit suppresses. PHP's log_errors writes the FULL message +
        # source location to a file regardless of Laravel's error handler, so:
        # run artisan test with log_errors on, then print the unique warnings.
        # Non-gating. REMOVE once the file_get_contents source is identified.
        if: always()
        continue-on-error: true
        run: |
          php -d log_errors=1 -d error_log=/tmp/phperr.log artisan test >/dev/null 2>&1 || true
          echo '=== unique file_get_contents warnings (full message + location) ==='
          grep -i 'file_get_contents' /tmp/phperr.log | sort -u | head -20

      - name: Run Pint (lint check)
        run: vendor/bin/pint --test
