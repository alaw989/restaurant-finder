name: CI Quality Gate

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-quality
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies (with dev)
        run: composer install

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create empty .env for testing
        # CI has no .env (gitignored). Without it, booting the artisan kernel
        # emits a file_get_contents('.env') warning per test (~260 spurious
        # "test triggered warning" entries). An EMPTY .env satisfies that read
        # with no env values, so phpunit.xml fully owns the test env. Do NOT
        # cp .env.example -- its empty APP_KEY= collides and breaks CSRF (419).
        run: touch .env

      - name: Run tests
        run: php artisan test

      - name: Run Pint (lint check)
        run: vendor/bin/pint --test
