name: Deploy to Staging

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies (with dev)
        run: composer install

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: php artisan test

      - name: Run Pint (lint check)
        run: vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        run: vendor/bin/phpstan analyze

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ["quality"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install Node dependencies and build
        run: npm ci && npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to droplet
        run: |
          rsync -avz --delete \
            --delay-updates \
            --chmod=D755,F644 \
            --exclude '.env' \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'storage/framework/cache/data/*' \
            --exclude 'storage/framework/sessions/*' \
            --exclude 'storage/framework/views/*' \
            --exclude 'storage/logs/*' \
            --exclude 'database/database.sqlite' \
            --exclude 'public/hot' \
            --exclude '.phpunit.result.cache' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Inject SerpApi quality key into server .env
        # .env is rsync-excluded and server-managed, so inject the one quality
        # key we need from a GitHub secret. Idempotent: removes any existing
        # SERPAPI_API_KEY line then appends. Runs before config:cache below so
        # the cached config picks up the key. Skipped entirely if no secret is
        # set, so it never clobbers a real key with an empty value.
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_API_KEY }}
        if: ${{ env.SERPAPI_KEY != '' }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             sed -i '/^SERPAPI_API_KEY=/d' .env && \
             printf 'SERPAPI_API_KEY=%s\n' '${{ secrets.SERPAPI_API_KEY }}' >> .env && \
             echo 'SERPAPI_API_KEY injected into .env'"

      - name: Post-deploy (fix permissions, migrate, cache)
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             sudo chown -R www-data:www-data storage database bootstrap/cache && \
             php8.4 artisan migrate --force && \
             php8.4 artisan config:cache && \
             php8.4 artisan route:cache && \
             php8.4 artisan view:cache && \
             php8.4 artisan cache:clear && \
             (php8.4 artisan seo:sitemap || echo 'seo:sitemap failed (non-fatal)') && \
             (sudo systemctl reload php8.4-fpm 2>/dev/null || sudo systemctl restart php8.4-fpm 2>/dev/null || true) && \
             supervisorctl restart ipop360-worker:*"

      - name: Ensure Laravel scheduler cron (restaurants:score, apicache:gc, uptime:canary)
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "PHP_BIN=\$(command -v php8.4 || command -v php); \
             echo \"* * * * * www-data cd \${{ secrets.DEPLOY_PATH }} && \${PHP_BIN} artisan schedule:run >> \${{ secrets.DEPLOY_PATH }}/storage/logs/scheduler.log 2>&1\" \
               | sudo tee /etc/cron.d/ipop360 > /dev/null && \
             sudo chmod 644 /etc/cron.d/ipop360 && \
             echo 'CRON INSTALLED:' && sudo cat /etc/cron.d/ipop360"

      - name: Verify deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://ipop360.vp-associates.com | grep -q 200 && echo 'DEPLOY OK' || exit 1
          curl -s 'https://ipop360.vp-associates.com/api/restaurants?cuisine=chinese&lat=30.6199783&lng=-88.1967496' | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if 'data' in d else 1)" && echo 'API OK' || exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
