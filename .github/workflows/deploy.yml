name: Deploy to Staging

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        # Full history (fetch-depth: 0) so gitleaks can resolve the push's
        # base^..head range — a shallow clone makes base^ "unknown revision"
        # and aborts the scan (blocking deploy) on multi-commit pushes.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies (with dev)
        run: composer install

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create empty .env for testing
        # CI has no .env (gitignored). Booting the artisan kernel without one
        # makes Laravel's dotenv file_get_contents('.env') warn once per test
        # (~260 spurious "test triggered warning" entries). An EMPTY .env
        # satisfies that read without introducing env values, so phpunit.xml
        # fully owns the test env (APP_KEY/DB/etc.). Do NOT cp .env.example --
        # it ships an empty APP_KEY= that collides with phpunit.xml and breaks
        # CSRF (419) on every POST test.
        run: touch .env

      - name: Run tests
        run: php artisan test

      - name: Run Pint (lint check)
        run: vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        run: vendor/bin/phpstan analyze

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ["quality"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, mbstring, xml, curl, bcmath, gd, zip, fileinfo
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install Node dependencies and build
        run: npm ci && npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to droplet
        run: |
          rsync -avz --delete \
            --delay-updates \
            --chmod=D755,F644 \
            --exclude '.env' \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'storage/framework/cache/data/*' \
            --exclude 'storage/framework/sessions/*' \
            --exclude 'storage/framework/views/*' \
            --exclude 'storage/logs/*' \
            --exclude 'database/database.sqlite' \
            --exclude 'public/hot' \
            --exclude '.phpunit.result.cache' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Inject SerpApi quality key into server .env
        # .env is rsync-excluded and server-managed, so inject the one quality
        # key we need from a GitHub secret. Idempotent: removes any existing
        # SERPAPI_API_KEY line then appends. Runs before config:cache below so
        # the cached config picks up the key. Skipped entirely if no secret is
        # set, so it never clobbers a real key with an empty value.
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_API_KEY }}
        if: ${{ env.SERPAPI_KEY != '' }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             sed -i '/^SERPAPI_API_KEY=/d' .env && \
             printf 'SERPAPI_API_KEY=%s\n' '${{ secrets.SERPAPI_API_KEY }}' >> .env && \
             echo 'SERPAPI_API_KEY injected into .env'"

      - name: Ensure Node 22 on droplet (for the Inertia SSR server)
        # The SSR process (spec-063) runs `node bootstrap/ssr/ssr.js`. The droplet
        # only ships php8.4, so ensure Node 22 matches the build runner.
        # Idempotent: a no-op once `node -v` reports v22.
        continue-on-error: true   # SSR is fail-safe (CSR fallback); never block the deploy on it
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "command -v node >/dev/null 2>&1 && node -v | grep -q '^v22' || \
             (curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash - && \
              sudo apt-get install -y nodejs) && \
             node -v"

      - name: Register the Inertia SSR supervisor program
        # Renders deploy/supervisor-ipop360-ssr.conf (rsync'd above) with the real
        # DEPLOY_PATH, writes it to /etc/supervisor/conf.d/, and reread+update so
        # supervisor picks it up (autostart brings it up on the first deploy).
        # The Post-deploy step restarts it each deploy to load the fresh ssr.js
        # bundle (supervisor only re-spawns on config change, not content change).
        continue-on-error: true   # never block the deploy on SSR setup (CSR fallback)
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "DEPLOY=${{ secrets.DEPLOY_PATH }} && \
             sed \"s|{{DEPLOY_PATH}}|\${DEPLOY}|g\" \${DEPLOY}/deploy/supervisor-ipop360-ssr.conf \
               | sudo tee /etc/supervisor/conf.d/ipop360-ssr.conf >/dev/null && \
             supervisorctl reread && \
             supervisorctl update"

      - name: Pre-migrate DB backup + maintenance window
        # spec-077: snapshot the SQLite DB (VACUUM INTO, rotated) so a bad
        # migration is recoverable (data loss here = a multi-month rebuild gated
        # by the SerpApi quota), then enter maintenance so no request hits a
        # half-migrated schema. Both are best-effort: if `down` can't write its
        # file (perms), we still migrate (the prior behavior); `db:backup` is the
        # safety net and never blocks. The matching `up` below unconditionally
        # removes the down file, so a failed `down` can never wedge the site.
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             (php8.4 artisan down || echo 'artisan down failed (non-fatal — migrating live)') && \
             (php8.4 artisan db:backup || echo 'db:backup failed (non-fatal)')"

      - name: Post-deploy (fix permissions, migrate, cache)
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             sudo chown -R www-data:www-data storage database bootstrap/cache && \
             php8.4 artisan migrate --force && \
             php8.4 artisan config:cache && \
             php8.4 artisan route:cache && \
             php8.4 artisan view:cache && \
             php8.4 artisan cache:clear && \
             (php8.4 artisan seo:sitemap || echo 'seo:sitemap failed (non-fatal)') && \
             (sudo systemctl reload php8.4-fpm 2>/dev/null || sudo systemctl restart php8.4-fpm 2>/dev/null || true) && \
             supervisorctl restart ipop360-worker:* && \
             (supervisorctl restart ipop360-ssr:* || true)"

      - name: Ensure Laravel scheduler cron (restaurants:score, apicache:gc, uptime:canary)
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "PHP_BIN=\$(command -v php8.4 || command -v php); \
             echo \"* * * * * www-data cd \${{ secrets.DEPLOY_PATH }} && \${PHP_BIN} artisan schedule:run >> \${{ secrets.DEPLOY_PATH }}/storage/logs/scheduler.log 2>&1\" \
               | sudo tee /etc/cron.d/ipop360 > /dev/null && \
             sudo chmod 644 /etc/cron.d/ipop360 && \
             echo 'CRON INSTALLED:' && sudo cat /etc/cron.d/ipop360"

      - name: Bring site out of maintenance
        # spec-077: ALWAYS exit maintenance, even if migrate failed — a hard
        # outage (stuck 503) is worse than serving the prior code while we
        # fix-forward (and the pre-migrate snapshot enables recovery). Can't SSH
        # from a checkout, so the down file must be removed no matter who owns it.
        # Run `artisan up` as www-data (the storage owner after Post-deploy's
        # chown); if that can't unlink the file, fall back to a root `rm`.
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && (sudo -u www-data php8.4 artisan up 2>/dev/null || sudo rm -f storage/framework/down || true)"

      - name: Verify deployment
        env:
          # spec-086: count-check kill-switch. Repository variable (non-secret).
          # Unset → 5. 0 → skip the count check (the 200 + data-key checks still run).
          DEPLOY_VERIFY_MIN_RESULTS: ${{ vars.DEPLOY_VERIFY_MIN_RESULTS }}
        run: |
          curl -s --connect-timeout 10 --max-time 30 -o /dev/null -w "%{http_code}" https://ipop360.vp-associates.com | grep -q 200 && echo 'DEPLOY OK' || exit 1
          # spec-086: assert HTTP 200 AND non-empty data on the API. A valid 200
          # with {"data":[]} is the app's load-bearing failure mode (a cache-nuking
          # migration or an over-filtering ranking change); the old check only
          # confirmed a `data` key existed, so it shipped empty deploys green.
          # Mobile/chinese historically returns ~13-30, so min=5 is recall-safe vs
          # a transient SerpApi quota dip. DEPLOY_VERIFY_MIN_RESULTS=0 skips the
          # COUNT check (kill-switch); the 200 + data-key checks always run.
          code=$(curl -s --connect-timeout 10 --max-time 30 -o /tmp/api.json -w '%{http_code}' 'https://ipop360.vp-associates.com/api/restaurants?cuisine=chinese&lat=30.6199783&lng=-88.1967496')
          if [ "$code" != "200" ]; then echo "API VERIFY FAILED: HTTP $code (expected 200)"; exit 1; fi
          python3 -c "
          import json, os, sys
          d = json.load(open('/tmp/api.json'))
          if 'data' not in d:
              print('API VERIFY FAILED: response has no data key'); sys.exit(1)
          raw = os.environ.get('DEPLOY_VERIFY_MIN_RESULTS') or '5'
          mn = int(raw) if raw.isdigit() else 5
          n = len(d.get('data') or [])
          if mn > 0 and n < mn:
              print(f'API VERIFY FAILED: {n} results (expected >= {mn}); set DEPLOY_VERIFY_MIN_RESULTS=0 to relax'); sys.exit(1)
          print(f'API OK: {n} results (min={mn})')
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
